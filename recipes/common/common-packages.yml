type: dnf
source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
install:
  install-weak-deps: false
  packages:
    - hardened_malloc
    - run0edit
    - dnsconfd-unbound

    # missing upstream
    - openssl
    - patch
    - 7zip-standalone-all
    - 7zip
    - distrobox
    - toolbox
    - podman
    - nvme-cli
    - hdparm
    - wireguard-tools
    - gettext
    - rsync
    - steam-devices

    # signing deps
    - sbsigntools

    # address hardened_malloc incompatibilities
    - no_rlimit_as

    # For use in unprivileged ujust scripts
    - python3-inquirer

    # provenance deps
    - crane
    - slsa-verifier
