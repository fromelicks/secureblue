type: dnf
source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
install:
  install-weak-deps: false
  packages:
    - headsetcontrol
    - mediainfo
    - bubblejail
    - usbguard-notifier
    - usbguard
    - setools
    - fscrypt
    - vim
    - wl-clipboard
    - alsa-firmware
    - fzf
    - bazaar
    - homebrew
    - firewall-config

    # yubikey enablement
    - pam-u2f
    - pam_yubico
    - pamu2fcfg
    - yubikey-manager

    # ensure universal font coverage
    - google-noto-fonts-all

    # libvirt/qemu/kvm packages
    - libvirt
    - libvirt-nss
    - qemu-device-display-virtio-gpu
    - qemu-device-display-virtio-vga
    - qemu-device-usb-redirect
    - qemu-img
    - qemu-kvm
    - qemu-tools
    - qemu-user
    - qemu-user-binfmt
    - virt-install
    - virt-manager
    - virt-viewer

    # ensure MTP support parity
    - libmtp
    - gvfs-mtp

    # ensure adb availability
    - android-tools

remove:
  packages:
    - firefox
    - firefox-langpacks
    - fuse
    - passim
    - fedora-chromium-config
replace:
  - from-repo: copr:copr.fedorainfracloud.org:secureblue:packages
    packages:
      - old: fedora-logos
        new: secureblue-logos
  - from-repo: fedora
    packages:
      - old: OpenCL-ICD-Loader
        new: ocl-icd
