modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    remove:
      packages:
        - kde-connect
        - kde-connect-libs
        - kdeconnectd
        - fedora-chromium-config-kde
        - fedora-flathub-remote
        # depends on fedora-flathub-remote
        - plasma-welcome-fedora
        - fuse-encfs
        - krfb
        - krfb-libs
        - plasma-browser-integration
        - plasma-discover
        - plasma-discover-libs
        - fedora-workstation-repositories
        - fedora-third-party
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    install:
      install-weak-deps: false
      packages:
        - krunner-bazaar
  - type: files
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    files:
      - source: system/kinoite
        destination: /
  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    validate: true
    include:
      - kinoite.just
  - type: script
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    scripts:
      - setdefaultkdewallpapers.sh
      - systemsettings-standard-malloc.sh
      - removekrunnerappstream.sh
