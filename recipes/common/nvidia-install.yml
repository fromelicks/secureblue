modules:
  - type: files
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    files:
      - source: system/nvidia
        destination: /

  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    validate: true
    include:
      - nvidia

  - type: script
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    scripts:
      - installnvidiakmod.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv

  - type: script
    source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
    scripts:
      - installnvidiapackages.sh
      - remove-nvidia-repos.sh
      - setearlyloading.sh
      - setdrmvariables.sh
