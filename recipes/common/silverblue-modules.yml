modules:
    - type: dnf
      source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
      install:
        install-weak-deps: false
        packages:
          - gnome-disk-utility
          - adw-gtk3-theme
          - gnome-tweaks
      remove:
        packages:
          - gnome-shell-extension-background-logo
          - gnome-tour
          - yelp
          - gnome-user-share
          - mod_lua
          - httpd
          - httpd-core
          - mod_http2
          - mod_dnssd
          - gnome-remote-desktop
          - libvncserver
          - fedora-chromium-config-gnome
          - gnome-software
          - epiphany-runtime
          - totem-video-thumbnailer
          - fedora-flathub-remote
          - fedora-third-party
          - fedora-workstation-repositories
    - type: gschema-overrides
      source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
      include:
        - zz1-secureblue.gschema.override
    - type: script
      source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
      scripts:
        - removedkmshelper.sh
    - type: files
      source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
      files:
        - source: system/silverblue
          destination: /
    - type: justfiles
      source: ghcr.io/blue-build/modules@sha256:d0e85328fcfa4182c33d3920854001d0b7efbbd341ed6f45bc1ec26c0751889d
      validate: true
      include:
        - silverblue.just
